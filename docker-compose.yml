services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-danilmakes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-danilmakes}
      POSTGRES_DB: ${POSTGRES_DB:-danilmakes}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-danilmakes}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-danilmakes}:${POSTGRES_PASSWORD:-danilmakes}@postgres:5432/${POSTGRES_DB:-danilmakes}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
