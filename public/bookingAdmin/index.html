<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка записей — портфолио-демо</title>
  <meta name="description" content="Демо простой админки: заявки на запись, фильтр и смена статуса.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="demo-banner">Портфолио-демо · Админка записей · синтетические данные</div>

  <div class="app">
    <header class="header">
      <div>
        <h1>Записи клиентов</h1>
        <p class="subtitle">Салон «Линия» — демо панели для мастера или администратора</p>
      </div>
      <div class="stats" id="stats"></div>
    </header>

    <div class="toolbar">
      <label>
        Статус
        <select id="status-filter">
          <option value="all">Все</option>
          <option value="new">Новые</option>
          <option value="confirmed">Подтверждены</option>
          <option value="done">Завершены</option>
          <option value="cancelled">Отменены</option>
        </select>
      </label>
      <label>
        Поиск
        <input type="search" id="search" placeholder="Имя или телефон">
      </label>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Клиент</th>
            <th>Услуга</th>
            <th>Дата</th>
            <th>Время</th>
            <th>Статус</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
