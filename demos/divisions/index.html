<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Divisions — Demo</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --text-xsmall: 10px;
        --text-small: 12px;
        --text-caption: 13px;
        --text-body: 14px;
        --text-hero: 20px;
        --text-h1: 24px;
        --text-h2: 20px;
        --text-h3: 16px;
        --text-h4: 14px;
      }

      html, body {
        margin: 0;
        min-height: 100%;
        max-width: 100%;
        overflow-x: clip;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: var(--text-body);
        color: #3c435a;
        background: #eef4f8;
      }

      @supports not (overflow-x: clip) {
        html, body {
          overflow-x: hidden;
        }
      }

      .demo-banner {
        background: linear-gradient(135deg, #1e8bc3 0%, #16739f 100%);
        color: #fff;
        font-size: var(--text-caption);
        letter-spacing: 0.02em;
        padding: 8px 16px;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .demo-content {
        max-width: 1400px;
        width: 100%;
        margin: 0 auto;
        padding: 16px 24px 24px;
        box-sizing: border-box;
      }

      divisions-page {
        display: block;
        min-width: 0;
      }

      @media (max-width: 768px) {
        :root {
          --text-body: 13px;
          --text-caption: 12px;
        }

        .demo-banner {
          font-size: 11px;
          line-height: 1.35;
          padding: 8px 12px;
          padding-top: max(8px, env(safe-area-inset-top));
        }

        .demo-content {
          padding: 12px 12px 20px;
          padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
      }

      @media (max-width: 480px) {
        .demo-banner {
          font-size: 10px;
          letter-spacing: 0.01em;
          padding-left: 8px;
          padding-right: 8px;
        }

        .demo-content {
          padding: 8px 4px 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="demo-banner">Портфолио-демо · Подразделения · синтетические данные</div>
    <div class="demo-content">
      <divisions-page></divisions-page>
    </div>
  </body>
</html>
